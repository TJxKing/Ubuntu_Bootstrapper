# ── General ──────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"   # true color support
set -g mouse on                                    # enable mouse
set -g history-limit 50000
set -g base-index 1                                # windows start at 1
setw -g pane-base-index 1                          # panes start at 1
set -g renumber-windows on                         # renumber on close
set -g set-clipboard on

# ── Prefix ───────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Splits ───────────────────────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Pane navigation (vim-style) ─────────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Pane resizing ────────────────────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Vi mode ──────────────────────────────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ── Reload config ────────────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# ── Status bar ───────────────────────────────────────────────────────────────
set -g status-position bottom
set -g status-style "bg=default,fg=white"
set -g status-left " #[fg=cyan,bold]#S #[fg=white]│ "
set -g status-right "#[fg=white]│ #[fg=yellow]%H:%M #[fg=white]│ #[fg=green]%d-%b-%y "
set -g status-left-length 30
set -g status-right-length 50
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #[fg=cyan,bold]#I:#W "

# ── Reduce escape delay (for vim) ───────────────────────────────────────────
set -sg escape-time 10
